{% extends 'base.html' %}

{% load crispy_forms_tags %}

{% block content %}
<h1>{% if form.instance.pk %}Edit{% else %}Add{% endif %} Student</h1>
<form method="post">
    {% csrf_token %}
    <!-- Use crispy form for better styling -->
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Save</button>
</form>
{% endblock %}
